  <rect x="200" y="722" width="60.6" height="13" rx="2" class="mollm"/><text x="268" y="733" class="value">115.37</text>
  <rect x="200" y="740" width="73.8" height="13" rx="2" class="llama"/><text x="281" y="751" class="value">140.51</text>
  <rect x="700" y="722" width="83.9" height="13" rx="2" class="mollm"/><text x="791" y="733" class="value">55.94</text>
  <rect x="700" y="740" width="66.4" height="13" rx="2" class="llama"/><text x="774" y="751" class="value">44.25</text>

