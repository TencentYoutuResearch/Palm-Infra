  <line x1="1015" y1="374" x2="1015" y2="526" class="grid"/>
  <line x1="1120" y1="374" x2="1120" y2="526" class="grid"/>

  <text x="40" y="401" class="label">Qwen3.5-0.8B</text>
  <rect x="200" y="380" width="352.7" height="13" rx="2" class="mollm"/><text x="559" y="391" class="value">671.73</text>
  <rect x="200" y="398" width="410.6" height="13" rx="2" class="llama"/><text x="617" y="409" class="value">782.16</text>
  <rect x="700" y="380" width="326.5" height="13" rx="2" class="mollm"/><text x="1033" y="391" class="value">217.69</text>
  <rect x="700" y="398" width="251.4" height="13" rx="2" class="llama"/><text x="958" y="409" class="value">167.63</text>

  <text x="40" y="447" class="label">Youtu-LLM-2B</text>
  <rect x="200" y="426" width="132.9" height="13" rx="2" class="mollm"/><text x="340" y="437" class="value">253.05</text>
  <rect x="200" y="444" width="138.6" height="13" rx="2" class="llama"/><text x="346" y="455" class="value">263.95</text>
  <rect x="700" y="426" width="134.3" height="13" rx="2" class="mollm"/><text x="842" y="437" class="value">89.53</text>
  <rect x="700" y="444" width="129.9" height="13" rx="2" class="llama"/><text x="837" y="455" class="value">86.58</text>

