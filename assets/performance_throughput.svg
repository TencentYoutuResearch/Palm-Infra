  <rect x="200" y="786" width="61.4" height="13" rx="2" class="llama"/><text x="269" y="797" class="value">116.93</text>
  <rect x="700" y="768" width="99.0" height="13" rx="2" class="mollm"/><text x="807" y="779" class="value">66.02</text>
  <rect x="700" y="786" width="65.6" height="13" rx="2" class="llama"/><text x="773" y="797" class="value">43.73</text>

  <text x="40" y="835" class="label">Qwen3-30B-A3B</text>
  <rect x="200" y="814" width="75.0" height="13" rx="2" class="mollm"/><text x="283" y="825" class="value">142.92</text>
  <rect x="200" y="832" width="57.9" height="13" rx="2" class="llama"/><text x="266" y="843" class="value">110.34</text>
