  <rect x="200" y="630" width="356.2" height="13" rx="2" class="mollm"/><text x="563" y="641" class="value">678.41</text>
  <rect x="200" y="648" width="407.4" height="13" rx="2" class="llama"/><text x="614" y="659" class="value">775.95</text>
  <rect x="700" y="630" width="389.1" height="13" rx="2" class="mollm"/><text x="1096" y="641" class="value">259.43</text>
  <rect x="700" y="648" width="286.3" height="13" rx="2" class="llama"/><text x="993" y="659" class="value">190.89</text>

  <text x="40" y="697" class="label">Youtu-LLM-2B</text>
  <rect x="200" y="676" width="130.2" height="13" rx="2" class="mollm"/><text x="338" y="687" class="value">248.08</text>
  <rect x="200" y="694" width="139.4" height="13" rx="2" class="llama"/><text x="347" y="705" class="value">265.58</text>
  <rect x="700" y="676" width="173.5" height="13" rx="2" class="mollm"/><text x="881" y="687" class="value">115.64</text>
  <rect x="700" y="694" width="145.7" height="13" rx="2" class="llama"/><text x="853" y="705" class="value">97.15</text>

