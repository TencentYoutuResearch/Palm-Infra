  <rect x="200" y="490" width="71.2" height="13" rx="2" class="llama"/><text x="279" y="501" class="value">135.58</text>
  <rect x="700" y="472" width="70.0" height="13" rx="2" class="mollm"/><text x="778" y="483" class="value">46.64</text>
  <rect x="700" y="490" width="60.8" height="13" rx="2" class="llama"/><text x="768" y="501" class="value">40.50</text>

  <line x1="200" y1="526" x2="620" y2="526" class="axis"/>
  <text x="196" y="544" class="tick">0</text><text x="296" y="544" class="tick">200</text><text x="401" y="544" class="tick">400</text><text x="506" y="544" class="tick">600</text><text x="611" y="544" class="tick">800</text>
  <line x1="700" y1="526" x2="1120" y2="526" class="axis"/>
  <text x="696" y="544" class="tick">0</text><text x="799" y="544" class="tick">70</text><text x="901" y="544" class="tick">140</text><text x="1009" y="544" class="tick">210</text><text x="1111" y="544" class="tick">280</text>

  <text x="40" y="604" class="section">W4</text>
  <text x="200" y="604" class="panel">Prompt / prefill pp256 tokens/s</text>
  <text x="700" y="604" class="panel">Decode tg64 tokens/s</text>
  <line x1="40" y1="618" x2="1140" y2="618" class="rule"/>
  <line x1="200" y1="624" x2="200" y2="868" class="grid"/>
  <line x1="305" y1="624" x2="305" y2="868" class="grid"/>
  <line x1="410" y1="624" x2="410" y2="868" class="grid"/>
  <line x1="515" y1="624" x2="515" y2="868" class="grid"/>
  <line x1="620" y1="624" x2="620" y2="868" class="grid"/>
  <line x1="700" y1="624" x2="700" y2="868" class="grid"/>
  <line x1="805" y1="624" x2="805" y2="868" class="grid"/>
  <line x1="910" y1="624" x2="910" y2="868" class="grid"/>
  <line x1="1015" y1="624" x2="1015" y2="868" class="grid"/>
  <line x1="1120" y1="624" x2="1120" y2="868" class="grid"/>

