<svg width="1500" height="900" viewBox="0 0 1500 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">mollm Metal throughput comparison</title>
  <desc id="desc">Five-run median pp256 and tg64 from context 256 on Apple M5 Pro, comparing mollm with llama.cpp Metal across four models and three precisions.</desc>
  <rect width="1500" height="900" fill="#fff"/>
  <style>
    .title{font:700 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#101828}.subtitle{font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}.head{font:700 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#101828}.section{font:700 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#101828}.label{font:12px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344054}.value{font:10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344054}.tick{font:10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667085}.m{fill:#2563eb}.l{fill:#94a3b8}.grid{stroke:#eaecf0;stroke-width:1}.axis{stroke:#cbd5e1;stroke-width:1}
  </style>
  <text x="38" y="44" class="title">Metal throughput comparison</text>
  <text x="38" y="68" class="subtitle">Apple M5 Pro · pp256 + tg64 from context 256 · warmup=3 · five independent processes · median tokens/s</text>
  <rect x="1260" y="36" width="15" height="10" rx="2" class="m"/><text x="1282" y="46" class="label">mollm</text>
  <rect x="1360" y="36" width="15" height="10" rx="2" class="l"/><text x="1382" y="46" class="label">llama.cpp</text>

  <text x="260" y="105" class="head">Prefill pp256</text><text x="850" y="105" class="head">Decode tg64 @ context 256</text>
  <text x="260" y="125" class="subtitle">0–9000 tokens/s</text><text x="850" y="125" class="subtitle">0–260 tokens/s</text>
  <line x1="260" y1="140" x2="260" y2="822" class="axis"/><line x1="850" y1="140" x2="850" y2="822" class="axis"/>
  <line x1="470" y1="140" x2="470" y2="822" class="grid"/><line x1="680" y1="140" x2="680" y2="822" class="grid"/>
  <line x1="1060" y1="140" x2="1060" y2="822" class="grid"/><line x1="1270" y1="140" x2="1270" y2="822" class="grid"/>
